<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Xcrow Admin{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --sidebar-w: 240px;
      --bg: #0f1117;
      --surface: #1a1d2e;
      --surface2: #212438;
      --border: #2a2d45;
      --accent: #7c5cfc;
      --accent2: #5c8dfc;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #38bdf8;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; }
    .sidebar {
      position: fixed; top: 0; left: 0; height: 100vh; width: var(--sidebar-w);
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; z-index: 100; overflow-y: auto;
    }
    .sidebar-brand {
      padding: 20px 18px; border-bottom: 1px solid var(--border);
      font-size: 1.1rem; font-weight: 700; color: var(--accent);
      display: flex; align-items: center; gap: 10px;
    }
    .nav-section { padding: 8px 0; }
    .nav-section-label {
      font-size: 0.65rem; font-weight: 600; letter-spacing: 1.2px;
      color: var(--muted); padding: 8px 18px 4px; text-transform: uppercase;
    }
    .nav-link {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 18px; color: var(--muted); font-size: 0.88rem;
      border-radius: 0; transition: all 0.15s; border-left: 3px solid transparent;
    }
    .nav-link:hover { color: var(--text); background: var(--surface2); }
    .nav-link.active { color: var(--accent); background: rgba(124,92,252,0.08); border-left-color: var(--accent); }
    .nav-link i { width: 16px; text-align: center; }
    .sidebar-footer { margin-top: auto; padding: 14px 18px; border-top: 1px solid var(--border); }
    .main-content { margin-left: var(--sidebar-w); min-height: 100vh; }
    .topbar {
      position: sticky; top: 0; z-index: 50;
      background: rgba(15,17,23,0.95); backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      padding: 12px 28px; display: flex; align-items: center; justify-content: space-between;
    }
    .topbar h1 { font-size: 1.1rem; font-weight: 600; margin: 0; }
    .content-area { padding: 28px; }
    .card-xcrow { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; transition: border-color 0.2s; }
    .stat-card:hover { border-color: var(--accent); }
    .stat-icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; margin-bottom: 12px; }
    .stat-value { font-size: 1.6rem; font-weight: 700; line-height: 1; }
    .stat-label { color: var(--muted); font-size: 0.8rem; margin-top: 4px; }
    .table-xcrow { color: var(--text); font-size: 0.88rem; }
    .table-xcrow th { color: var(--muted); font-weight: 500; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; border-color: var(--border); padding: 10px 14px; }
    .table-xcrow td { border-color: var(--border); padding: 10px 14px; vertical-align: middle; }
    .table-xcrow tbody tr:hover { background: rgba(255,255,255,0.03); }
    .badge-status { font-size: 0.73rem; padding: 3px 9px; border-radius: 20px; font-weight: 500; }
    .s-funded, .s-in_delivery, .s-buyer_confirming { background: rgba(34,197,94,0.15); color: var(--success); }
    .s-completed { background: rgba(56,189,248,0.15); color: var(--info); }
    .s-disputed { background: rgba(239,68,68,0.15); color: var(--danger); }
    .s-releasing { background: rgba(245,158,11,0.15); color: var(--warning); }
    .s-cancelled, .s-refunded { background: rgba(148,163,184,0.1); color: var(--muted); }
    .s-step5_pending, .s-awaiting_payment { background: rgba(124,92,252,0.15); color: var(--accent); }
    .s-draft, .s-step1_pending, .s-step2_pending, .s-step3_pending, .s-step4_pending { background: rgba(148,163,184,0.1); color: var(--muted); }
    .btn-accent { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-accent:hover { background: #6a4de8; border-color: #6a4de8; color: #fff; }
    .form-control-xcrow { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 8px 12px; }
    .form-control-xcrow:focus { background: var(--surface2); border-color: var(--accent); color: var(--text); box-shadow: 0 0 0 3px rgba(124,92,252,0.2); outline: none; }
    label { color: var(--muted); font-size: 0.82rem; font-weight: 500; }
    .page-link { background: var(--surface); border-color: var(--border); color: var(--text); }
    .page-link:hover { background: var(--surface2); color: var(--accent); }
    .page-item.active .page-link { background: var(--accent); border-color: var(--accent); }
    .alert-success-xcrow { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: var(--success); border-radius: 8px; padding: 12px 16px; }
    code { background: var(--surface2); color: var(--accent2); padding: 2px 6px; border-radius: 4px; font-size: 0.85em; }
    a { color: var(--accent2); text-decoration: none; }
    a:hover { color: var(--accent); }
    select.form-control-xcrow option { background: var(--surface2); }
  </style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-brand"><span style="font-size:1.4rem;">🔐</span><span>XCROW Admin</span></div>
  <div class="nav-section">
    <div class="nav-section-label">Overview</div>
    <a href="/panel/" class="nav-link {% if active == 'dashboard' %}active{% endif %}"><i class="fa fa-gauge-high"></i> Dashboard</a>
  </div>
  <div class="nav-section">
    <div class="nav-section-label">Operations</div>
    <a href="/panel/deals" class="nav-link {% if active == 'deals' %}active{% endif %}"><i class="fa fa-handshake"></i> Deals</a>
    <a href="/panel/payments" class="nav-link {% if active == 'payments' %}active{% endif %}"><i class="fa fa-credit-card"></i> Payments</a>
    <a href="/panel/disputes" class="nav-link {% if active == 'disputes' %}active{% endif %}"><i class="fa fa-triangle-exclamation"></i> Disputes</a>
    <a href="/panel/users" class="nav-link {% if active == 'users' %}active{% endif %}"><i class="fa fa-users"></i> Users</a>
    <a href="/panel/tickets" class="nav-link {% if active == 'tickets' %}active{% endif %}"><i class="fa fa-ticket"></i> Support Tickets</a>
  </div>
  <div class="nav-section">
    <div class="nav-section-label">Configuration</div>
    <a href="/panel/settings" class="nav-link {% if active == 'settings' %}active{% endif %}"><i class="fa fa-sliders"></i> Settings</a>
    <a href="/panel/logs" class="nav-link {% if active == 'logs' %}active{% endif %}"><i class="fa fa-file-lines"></i> Audit Logs</a>
  </div>
  <div class="sidebar-footer">
    <a href="/panel/logout" class="nav-link" style="padding:8px 0;"><i class="fa fa-right-from-bracket"></i> Logout</a>
  </div>
</div>
<div class="main-content">
  <div class="topbar">
    <h1>{% block page_title %}Dashboard{% endblock %}</h1>
    <div style="font-size:0.8rem;color:var(--muted);">
      <i class="fa fa-circle" style="color:var(--success);font-size:0.6rem;"></i>
      Online · {{ now.strftime('%d %b %Y %H:%M') }} UTC
    </div>
  </div>
  <div class="content-area">{% block content %}{% endblock %}</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xcrow Admin — Login</title>
  <style>
    body { background:#0f1117; color:#e2e8f0; font-family:system-ui,sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .login-card { background:#1a1d2e; border:1px solid #2a2d45; border-radius:16px; padding:40px; width:100%; max-width:380px; }
    .brand { text-align:center; margin-bottom:32px; }
    .brand-icon { font-size:2.4rem; margin-bottom:10px; }
    .brand-title { font-size:1.4rem; font-weight:700; color:#7c5cfc; }
    .brand-sub { color:#94a3b8; font-size:0.85rem; margin-top:4px; }
    .form-control { background:#212438; border:1px solid #2a2d45; color:#e2e8f0; border-radius:8px; padding:10px 14px; width:100%; font-size:0.95rem; }
    .form-control:focus { border-color:#7c5cfc; outline:none; box-shadow:0 0 0 3px rgba(124,92,252,0.2); }
    label { color:#94a3b8; font-size:0.82rem; font-weight:500; display:block; margin-bottom:6px; }
    .mb-3 { margin-bottom:18px; }
    .btn-login { background:#7c5cfc; border:none; color:#fff; border-radius:8px; padding:11px; font-weight:600; width:100%; font-size:1rem; cursor:pointer; transition:background 0.2s; }
    .btn-login:hover { background:#6a4de8; }
    .error-box { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); color:#ef4444; border-radius:8px; padding:10px 14px; font-size:0.85rem; margin-bottom:16px; }
    ::placeholder { color:#4a5568; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand">
      <div class="brand-icon">🔐</div>
      <div class="brand-title">XCROW Admin</div>
      <div class="brand-sub">Secure Dashboard</div>
    </div>
    {% if error %}<div class="error-box">{{ error }}</div>{% endif %}
    <form method="post">
      <div class="mb-3">
        <label for="password">Admin Password</label>
        <input type="password" class="form-control" id="password" name="password" placeholder="Enter password" required autofocus>
      </div>
      <button type="submit" class="btn-login">Sign In</button>
    </form>
  </div>
</body>
</html>
